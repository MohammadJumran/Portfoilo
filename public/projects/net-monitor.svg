    <text x="330" y="190" fill="#7a8491">192.168.20.10</text>
    <text x="500" y="190" fill="#5b6b78">—</text>

    <text x="62" y="218" fill="#43c478">UP</text>
    <text x="120" y="218" fill="#cdd7df">File Server</text>
    <text x="330" y="218" fill="#7a8491">192.168.20.20</text>
