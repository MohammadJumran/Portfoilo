<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" font-family="'JetBrains Mono', monospace">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10171d"/>
      <stop offset="1" stop-color="#0c1115"/>
    </linearGradient>
    <pattern id="grid3" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#1d2730" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="640" height="360" fill="url(#bg3)"/>
  <rect width="640" height="360" fill="url(#grid3)"/>
  <text x="24" y="34" fill="#20b2a6" font-size="13" letter-spacing="2">CCTV HEALTH MONITORING</text>

  <!-- cameras column -->
  <g>
    <!-- cam 1 online -->
    <rect x="40" y="70" width="150" height="44" rx="8" fill="#13202a" stroke="#43c478" stroke-width="1.5"/>
    <circle cx="58" cy="92" r="5" fill="#43c478"/>
    <text x="74" y="89" fill="#cdd7df" font-size="11">Entrance</text>
    <text x="74" y="104" fill="#7a8491" font-size="9">.20.11 · rtsp ok</text>

    <!-- cam 2 offline -->
    <rect x="40" y="128" width="150" height="44" rx="8" fill="#13202a" stroke="#e0564b" stroke-width="1.5"/>
    <circle cx="58" cy="150" r="5" fill="#e0564b"/>
    <text x="74" y="147" fill="#cdd7df" font-size="11">Warehouse</text>
    <text x="74" y="162" fill="#7a8491" font-size="9">.20.12 · no ping</text>

    <!-- cam 3 no-stream -->
    <rect x="40" y="186" width="150" height="44" rx="8" fill="#13202a" stroke="#f5a623" stroke-width="1.5"/>
    <circle cx="58" cy="208" r="5" fill="#f5a623"/>
    <text x="74" y="205" fill="#cdd7df" font-size="11">Loading Bay</text>
    <text x="74" y="220" fill="#7a8491" font-size="9">.20.13 · rtsp down</text>

    <!-- cam 4 online -->
    <rect x="40" y="244" width="150" height="44" rx="8" fill="#13202a" stroke="#43c478" stroke-width="1.5"/>
    <circle cx="58" cy="266" r="5" fill="#43c478"/>
    <text x="74" y="263" fill="#cdd7df" font-size="11">Office</text>
    <text x="74" y="278" fill="#7a8491" font-size="9">.20.14 · rtsp ok</text>
  </g>

  <!-- links to NVR -->
  <g stroke="#2c3a45" stroke-width="2">
    <line x1="190" y1="92" x2="330" y2="179"/>
    <line x1="190" y1="150" x2="330" y2="179"/>
    <line x1="190" y1="208" x2="330" y2="179"/>
    <line x1="190" y1="266" x2="330" y2="179"/>
  </g>

  <!-- NVR -->
  <rect x="330" y="150" width="120" height="58" rx="8" fill="#13202a" stroke="#20b2a6" stroke-width="2"/>
  <text x="390" y="176" fill="#e6f7f5" font-size="13" text-anchor="middle">NVR</text>
  <text x="390" y="194" fill="#7a8491" font-size="9" text-anchor="middle">.20.10</text>

  <!-- monitor / dashboard -->
  <line x1="450" y1="179" x2="500" y2="179" stroke="#2c3a45" stroke-width="2"/>
  <rect x="500" y="140" width="104" height="78" rx="8" fill="#0b1014" stroke="#3a4a55" stroke-width="1.5"/>
  <text x="552" y="166" fill="#20b2a6" font-size="11" text-anchor="middle">monitor.py</text>
  <text x="552" y="188" fill="#cdd7df" font-size="14" text-anchor="middle">2 / 4</text>
  <text x="552" y="204" fill="#7a8491" font-size="9" text-anchor="middle">healthy</text>
</svg>
