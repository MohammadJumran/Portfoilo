<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" font-family="'JetBrains Mono', monospace">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10171d"/>
      <stop offset="1" stop-color="#0c1115"/>
    </linearGradient>
    <pattern id="grid1" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#1d2730" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="640" height="360" fill="url(#bg1)"/>
  <rect width="640" height="360" fill="url(#grid1)"/>
  <text x="24" y="34" fill="#20b2a6" font-size="13" letter-spacing="2">MIKROTIK · SMALL-OFFICE TOPOLOGY</text>

  <!-- Internet -->
  <circle cx="320" cy="70" r="22" fill="none" stroke="#5b6b78" stroke-width="2"/>
  <text x="320" y="74" fill="#9fb0bd" font-size="11" text-anchor="middle">WAN</text>
  <line x1="320" y1="92" x2="320" y2="120" stroke="#2c3a45" stroke-width="2"/>

  <!-- Router -->
  <rect x="262" y="120" width="116" height="42" rx="8" fill="#13202a" stroke="#20b2a6" stroke-width="2"/>
  <text x="320" y="146" fill="#e6f7f5" font-size="12" text-anchor="middle">RouterOS</text>
  <line x1="320" y1="162" x2="320" y2="190" stroke="#2c3a45" stroke-width="2"/>

  <!-- Switch -->
  <rect x="250" y="190" width="140" height="34" rx="6" fill="#141a1f" stroke="#3a4a55" stroke-width="2"/>
  <text x="320" y="212" fill="#9fb0bd" font-size="11" text-anchor="middle">SWITCH · trunk</text>

  <!-- VLAN links -->
  <line x1="320" y1="224" x2="130" y2="272" stroke="#2c3a45" stroke-width="2"/>
  <line x1="320" y1="224" x2="320" y2="272" stroke="#2c3a45" stroke-width="2"/>
  <line x1="320" y1="224" x2="510" y2="272" stroke="#2c3a45" stroke-width="2"/>

  <!-- VLAN 10 -->
  <rect x="60" y="272" width="140" height="56" rx="8" fill="#13202a" stroke="#20b2a6" stroke-width="1.5"/>
  <text x="130" y="294" fill="#20b2a6" font-size="12" text-anchor="middle">VLAN 10</text>
  <text x="130" y="312" fill="#7a8491" font-size="10" text-anchor="middle">Staff · .10.0/24</text>

  <!-- VLAN 20 -->
  <rect x="250" y="272" width="140" height="56" rx="8" fill="#13202a" stroke="#f5a623" stroke-width="1.5"/>
  <text x="320" y="294" fill="#f5a623" font-size="12" text-anchor="middle">VLAN 20</text>
  <text x="320" y="312" fill="#7a8491" font-size="10" text-anchor="middle">Servers/CCTV</text>

  <!-- VLAN 30 -->
  <rect x="440" y="272" width="140" height="56" rx="8" fill="#13202a" stroke="#5b6b78" stroke-width="1.5"/>
  <text x="510" y="294" fill="#9fb0bd" font-size="12" text-anchor="middle">VLAN 30</text>
  <text x="510" y="312" fill="#7a8491" font-size="10" text-anchor="middle">Guest (isolated)</text>
</svg>
